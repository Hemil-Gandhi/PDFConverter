<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="nav-logo" (click)="closeAll()">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M9 15l2 2 4-4"/>
        </svg>
      </div>
      <span class="logo-text">PDF<span class="logo-accent">Converter</span></span>
    </a>

    <div class="nav-links" [class.active]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeAll()">Home</a>
      
      <div class="nav-dropdown">
        <button class="dropdown-trigger" (click)="toggleTools()">
          Tools
          <svg viewBox="0 0 12 12" class="dropdown-arrow" [class.rotated]="toolsOpen"><path d="M3 5l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <div class="dropdown-menu" [class.show]="toolsOpen">
          <div class="dropdown-section">
            <span class="dropdown-label">Convert</span>
            <a routerLink="/convert" (click)="closeAll()">🔄 File Converter</a>
          </div>
          <div class="dropdown-section">
            <span class="dropdown-label">PDF Tools</span>
            <a routerLink="/merge" (click)="closeAll()">📎 Merge PDF</a>
            <a routerLink="/split" (click)="closeAll()">✂️ Split PDF</a>
            <a routerLink="/compress" (click)="closeAll()">📦 Compress PDF</a>
            <a routerLink="/edit" (click)="closeAll()">✏️ Edit PDF</a>
            <a routerLink="/watermark" (click)="closeAll()">💧 Watermark</a>
            <a routerLink="/protect" (click)="closeAll()">🔒 Protect PDF</a>
            <a routerLink="/organize" (click)="closeAll()">📑 Organize Pages</a>
            <a routerLink="/translate" (click)="closeAll()">🌐 Translate PDF</a>
          </div>
        </div>
      </div>

      <a routerLink="/history" routerLinkActive="active" (click)="closeAll()">History</a>
    </div>

    <button class="mobile-toggle" (click)="toggleMenu()">
      <span [class.open]="menuOpen"></span>
    </button>
  </div>
</nav>
